openapi: 3.0.3 
info: 
  title: Order Service API 
  version: 1.0.0 
paths: 
  /health: 
    get: 
      summary: Health check 
      responses: 
        '200': 
          description: Service is healthy 
  /cart/{userId}: 
    get: 
      summary: Get the current cart for a user 
      parameters: 
        - in: path 
          name: userId 
          required: true 
          schema: 
            type: string 
      responses: 
        '200': 
          description: Cart fetched successfully 
  /cart/{userId}/items: 
    post: 
      summary: Add an item to the cart 
      parameters: 
        - in: path 
          name: userId 
          required: true 
          schema: 
            type: string 
      requestBody: 
        required: true 
        content: 
          application/json: 
            schema: 
              $ref: '#/components/schemas/CartItemRequest' 
      responses: 
        '200': 
          description: Item added to cart successfully 
  /cart/{userId}/items/{productId}: 
    patch: 
      summary: Update a cart item quantity 
      parameters: 
        - in: path 
          name: userId 
          required: true 
          schema: 
            type: string 
        - in: path 
          name: productId 
          required: true 
          schema: 
            type: string 
      requestBody: 
        required: true 
        content: 
          application/json: 
            schema: 
              type: object 
              required: [quantity] 
              properties: 
                quantity: 
                  type: integer 
                  minimum: 0 
      responses: 
        '200': 
          description: Cart item updated successfully 
    delete: 
      summary: Remove a cart item 
      parameters: 
        - in: path 
          name: userId 
          required: true 
          schema: 
            type: string 
        - in: path 
          name: productId 
          required: true 
          schema: 
            type: string 
      responses: 
        '200': 
          description: Cart item removed successfully
  /checkout: 
    post: 
      summary: Checkout the cart and create an order 
      requestBody: 
        required: true 
        content: 
          application/json: 
            schema: 
              $ref: '#/components/schemas/CheckoutRequest' 
      responses: 
        '201': 
          description: Checkout completed successfully 
  /orders: 
    get: 
      summary: List all orders 
      responses: 
        '200': 
          description: Orders fetched successfully 
    post: 
      summary: Create a new order 
      requestBody: 
        required: true 
        content: 
          application/json: 
            schema: 
              $ref: '#/components/schemas/CreateOrderRequest' 
      responses: 
        '201': 
          description: Order created successfully 
  /orders/{id}: 
    get: 
      summary: Get an order by ID 
      parameters: 
        - in: path 
          name: id 
          required: true 
          schema: 
            type: string 
      responses: 
        '200': 
          description: Order fetched successfully 
        '404': 
          description: Order not found 
  /orders/{id}/status: 
    patch: 
      summary: Update order status 
      parameters: 
        - in: path 
          name: id 
          required: true 
          schema: 
            type: string 
      requestBody: 
        required: true 
        content: 
          application/json: 
            schema: 
              type: object 
              required: [status] 
              properties: 
                status: 
                  type: string 
                  enum: [pending, paid, shipped, completed, cancelled] 
      responses: 
        '200': 
          description: Order status updated successfully 
        '400': 
          description: Invalid status 
        '404': 
          description: Order not found
components: 
  schemas: 
    CartItemRequest: 
      type: object 
      required: [productId, name, quantity, price] 
      properties: 
        productId: 
          type: string 
        name: 
          type: string 
        quantity: 
          type: integer 
          minimum: 1 
        price: 
          type: number 
          minimum: 0 
    CheckoutRequest: 
      type: object 
      required: [userId, shippingAddress] 
      properties: 
        userId: 
          type: string 
        shippingAddress: 
          type: string 
    CreateOrderRequest: 
      type: object 
      required: [userId, shippingAddress, items] 
      properties: 
        userId: 
          type: string 
        shippingAddress: 
          type: string 
        items: 
          type: array 
          items: 
            type: object 
            required: [productId, name, quantity, price] 
            properties: 
              productId: 
                type: string 
              name: 
                type: string 
              quantity: 
                type: integer 
              price: 
                type: number
